<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Compra - Abarrotes</title>
    <link rel="stylesheet" href="ccs/stiles.css" >
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .container {
            width: 400px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .btn {
            margin-top: 15px;
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }

        .btn:hover {
            background-color: #218838;
            transform: scale(1.5);
        }
    </style>
</head>
<body>
       <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
           integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
           crossorigin="Anonymous"></script>
  <header>
      <nav class="menu-navegacion">
          <h1>
             <img src="imagenes/imagen5.png" alt="logo de la empresa"width="60" height="60">
              Tienda de Abarrotes Chris-Market
         </h1>

            <a href="index.html">Inicio</a> |
            <a href="productos.html">Productos</a> |
            <a href="servicios.html">Servicios</a> |
            <a href="locales.html">Locales</a>|
            <a href="contactos.html">Contactos</a>
       </nav>
   </header>
<div class="container">
    <h2>Compra de Abarrotes</h2>

    <form>
        <!-- Datos del cliente -->
        <label>Nombre completo</label>
        <input type="text" placeholder="Ingrese su nombre" required>

        <label>Teléfono</label>
        <input type="tel" placeholder="Ingrese su teléfono" required>

        <label>Dirección</label>
        <textarea placeholder="Ingrese su dirección" required></textarea>

        <!-- Productos -->
        <label>Producto</label>
        <select>
            <option>Arroz</option>
            <option>Azúcar</option>
            <option>Aceite</option>
            <option>Leche</option>
            <option>Pan</option>
        </select>

        <label>Cantidad</label>
        <input type="number" min="1" value="1">

        <!-- Forma de pago -->
        <label>Método de pago</label>
        <select>
            <option>Efectivo</option>
            <option>Tarjeta</option>
            <option>Yape / Plin</option>
        </select>

        <!-- Botón -->
        <button type="submit" class="btn">Realizar Compra</button>
    </form>
</div>

</body>
</html>
