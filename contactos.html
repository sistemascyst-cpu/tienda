<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Cliente</title>
    <link rel="stylesheet" href="css/stiles.css" >
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f7;
        }

        .form-container {
            width: 450px;
            margin: 40px auto;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
            color: #555;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row div {
            flex: 1;
        }

        .btn {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn:hover {
            background: #0056b3;
        }
     </style>
</head>
<body>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
             integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
              crossorigin="Anonymous">
            </script>
     <header>
       <nav class="menu-navegacion">
          <h1>
             <img src="imagenes/imagen5.png" alt="logo de la empresa"width="60" height="60">
              Tienda de Abarrotes Chris-Market
         </h1>

            <a href="index.html">Inicio</a> |
            <a href="productos.html">Productos</a> |
            <a href="servicios.html">Servicios</a> |
            <a href="locales.html">Locales</a>|
            <a href="contactos.html">Contactos</a>
       </nav>
     </header>

       <div class="form-container">
       <h2>Registro de Cliente</h2>

    <form>
        <!-- Nombre -->
        <label>Nombre completo</label>
        <input type="text" placeholder="Ingrese su nombre completo" required>

        <!-- Documento -->
        <label>Tipo de documento</label>
        <select>
            <option>DNI</option>
            <option>Pasaporte</option>
            <option>Carnet de extranjería</option>
        </select>

        <label>Número de documento</label>
        <input type="text" placeholder="Ingrese su documento" required>

        <!-- Contacto -->
        <div class="row">
            <div>
                <label>Teléfono</label>
                <input type="tel" placeholder="Teléfono" required>
            </div>
            <div>
                <label>Correo</label>
                <input type="email" placeholder="Correo electrónico">
            </div>
        </div>

        <!-- Dirección -->
        <label>Dirección</label>
        <input type="text" placeholder="Ingrese su dirección" required>

        <!-- Ciudad -->
        <label>Ciudad</label>
        <input type="text" placeholder="Ingrese su ciudad">

        <!-- Fecha -->
        <label>Fecha de registro</label>
        <input type="date">

        <!-- Botón -->
        <button type="submit" class="btn">Registrar Cliente</button>
    </form>
</div>

</body>
</html>
